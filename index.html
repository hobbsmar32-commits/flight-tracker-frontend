<!DOCTYPE html>
<html>
<head>
  <title>Flight Radar Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      background: #0b0f14;
      color: #00ffcc;
      font-family: Arial;
    }

    #map {
      height: 55vh;
    }

    .panel {
      padding: 15px;
    }

    input, button {
      font-size: 18px;
      padding: 10px;
      margin: 5px;
    }

    button {
      background: #00ffcc;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .card {
      background: #111827;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
    }

    a {
      color: #00ffcc;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div class="panel">

  <input id="flight" placeholder="DL2464">
  <button onclick="track()">TRACK FLIGHT</button>

  <div class="card">
    <h2 id="info">Enter a flight</h2>
    <p id="route"></p>
    <p id="status"></p>
  </div>

  <div class="card">
    <h3>🎧 Live ATC</h3>
    <audio id="audio" controls></audio>
  </div>

  <div class="card">
    <h3>🔗 External Tracking</h3>
    <a id="fr24" target="_blank">Open in Flightradar24</a>
  </div>

</div>

<script>
let map = L.map('map').setView([39, -95], 4);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let planes = {};

async function updateRadar() {
  const res = await fetch("https://flight-tracker-backend-2l64.onrender.com");
  const data = await res.json();

  data.states.forEach(p => {
    if (!p[5] || !p[6]) return;

    const id = p[1];
    const lon = p[5];
    const lat = p[6];

    if (!planes[id]) {
      planes[id] = L.marker([lat, lon]).addTo(map);
    } else {
      planes[id].setLatLng([lat, lon]);
    }
  });
}

setInterval(updateRadar, 5000);
updateRadar();
</script>

</body>
</html>
